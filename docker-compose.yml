version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=models
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY:-}
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  model-data:
